name: CI

on:
  repository_dispatch:
    types: [Component_update]
  push:
    branches:
      - '*'
    tags:
      - 'v*'
    paths-ignore:
      - '**.MD'
      - '**.gitkeep'
      - '**.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:

      - name: Install dependencies
        run: |
          apk add build-base git p7zip

      - uses: actions/checkout@v4
      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Compile 
        run: |
          make -C libbdm clean all
          make -C __dev9_bdm_assault/ clean all
          make -C __atad_bd_assault/ clean all
          mkdir -p READY_TO_USE_ATA/POPStarter/POPSTARTER/
          mkdir -p READY_TO_USE_ATA/FreeMcBoot/SYS-CONF/
          cp usbd.irx READY_TO_USE_ATA/POPStarter/POPSTARTER/usbd.irx
          cp usbhdfsd.irx READY_TO_USE_ATA/POPStarter/POPSTARTER/usbhdfsd.irx
          cp usbd.irx READY_TO_USE_ATA/FreeMcBoot/SYS-CONF/USBD.IRX
          cp usbhdfsd.irx READY_TO_USE_ATA/FreeMcBoot/SYS-CONF/USBHDFSD.IRX
          7z a -t7z ATAAssault.7z *.irx LICENSE README.MD READY_TO_USE_ATA/*

      - name: Upload artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ATA_ASSAULT
          path: |
            *.irx

      - name: Create release
        if: github.ref == 'refs/heads/main'
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: true
          automatic_release_tag: "latest"
          title: "Latest development build"
          files: |
            ATAAssault.7z
